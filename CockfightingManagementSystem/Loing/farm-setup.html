<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มข้อมูลฟาร์ม - Super Kaichon</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="assets/css/farm-setup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&family=Prompt:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/motion.css">
</head>

<body class="login-page">

    <a href="dashboard.php" class="skip-top-link">
        ข้ามไปก่อน
        <i class="bi bi-arrow-right"></i>
    </a>

    <main class="min-h-screen flex items-center justify-center px-4 py-8">
        <section class="login-card reveal-scale w-full max-w-[90%] sm:max-w-[460px] md:max-w-[620px]">

            <h1 class="text-2xl font-bold text-center mb-2">
                เพิ่มข้อมูลฟาร์มของคุณ
            </h1>

            <p class="text-center text-sm text-gray-500 mb-6 leading-relaxed">
                ข้อมูลนี้จะช่วยให้ผู้ซื้อรู้จักฟาร์มของคุณมากขึ้น<br>
                คุณสามารถข้ามขั้นตอนนี้และกลับมาเพิ่มภายหลังได้
            </p>

            <form id="farm-setup-form" method="POST" enctype="multipart/form-data">

                <!-- Farm Name -->
                <div class="mb-3">
                    <label class="login-label">ชื่อฟาร์ม</label>

                    <div class="input-group">
                        <i class="bi bi-house-heart input-icon"></i>
                        <input
                            type="text"
                            id="farm-name"
                            name="farm_name"
                            class="login-input"
                            placeholder="กรุณากรอกชื่อฟาร์ม"
                        >
                    </div>

                    <p id="farm-name-error" class="input-error"></p>
                </div>

                <!-- Farm Phone -->
                <div class="mb-3">
                    <label class="login-label">เบอร์โทรติดต่อ</label>

                    <div class="input-group">
                        <i class="bi bi-telephone input-icon"></i>
                        <input
                            type="tel"
                            id="farm-phone"
                            name="farm_phone"
                            class="login-input"
                            placeholder="09xxxxxxxx"
                        >
                    </div>

                    <p id="farm-phone-error" class="input-error"></p>
                </div>

                <!-- Farm Address -->
                <div class="mb-3">
                    <div class="address-label-row">
                        <label class="login-label">ที่อยู่ฟาร์ม</label>

                        
                    </div>

                    <div class="input-group">
                        <i class="bi bi-geo-alt input-icon"></i>
                        <input
                            type="text"
                            id="farm-address"
                            name="farm_address"
                            class="login-input"
                            placeholder="กรอกที่อยู่ หรือเลือกจากแผนที่"
                        >
                    </div>


                    <p id="farm-address-error" class="input-error"></p>
                </div>

                <!-- Farm Description -->
                <div class="mb-4">
                    <label class="login-label">รายละเอียดฟาร์ม <span class="optional-text">(ไม่บังคับ)</span></label>

                    <div class="input-group textarea-group">
                        <i class="bi bi-card-text input-icon textarea-icon"></i>
                        <textarea
                            id="farm-description"
                            name="farm_description"
                            class="login-input farm-textarea"
                            placeholder="อธิบายฟาร์มของคุณสั้น ๆ เช่น สายพันธุ์ที่เลี้ยง จุดเด่นของฟาร์ม หรือประสบการณ์"
                        ></textarea>
                    </div>

                    <p id="farm-description-error" class="input-error"></p>
                </div>

                <!-- Farm Images -->
                <div class="upload-section">

                    <div class="upload-box reveal-scale stagger-item">
                        <label for="farm-profile-image" class="upload-label">
                            <i class="bi bi-image"></i>
                            <span>รูปโปรไฟล์ฟาร์ม</span>
                            <small>เลือกรูปโลโก้หรือรูปหน้าฟาร์ม</small>
                        </label>

                        <input
                            type="file"
                            id="farm-profile-image"
                            name="farm_profile_image"
                            accept="image/*"
                            hidden
                        >

                        <img id="farm-profile-preview" class="image-preview" alt="">
                        <p id="farm-profile-image-error" class="input-error"></p>
                    </div>

                    <div class="upload-box reveal-scale stagger-item">
                        <label for="farm-cover-image" class="upload-label">
                            <i class="bi bi-images"></i>
                            <span>รูปหน้าปกฟาร์ม</span>
                            <small>ใช้แสดงบนหน้าโปรไฟล์ฟาร์ม</small>
                        </label>

                        <input
                            type="file"
                            id="farm-cover-image"
                            name="farm_cover_image"
                            accept="image/*"
                            hidden
                        >

                        <img id="farm-cover-preview" class="image-preview" alt="">
                        <p id="farm-cover-image-error" class="input-error"></p>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="farm-action-row">
                    <button id="skip-farm-btn" type="button" class="skip-btn">
                        ข้ามไปก่อน
                    </button>

                    <button id="save-farm-btn" type="submit" class="login-submit-btn">
                        บันทึกข้อมูลฟาร์ม
                    </button>
                </div>

            </form>
        </section>
    </main>
    

    <!-- Success Modal -->
    <div class="farm-success-modal" id="farm-success-modal">
        <div class="farm-success-box reveal-scale">
            <i class="bi bi-check-circle-fill farm-success-icon"></i>

            <h2>บันทึกข้อมูลฟาร์มสำเร็จ</h2>

            <p>
                ข้อมูลฟาร์มของคุณถูกบันทึกเรียบร้อยแล้ว<br>
                คุณสามารถจัดการฟาร์มและเพิ่มข้อมูลไก่ชนได้ภายหลัง
            </p>

            <button id="go-dashboard-btn" type="button" class="success-btn">
                ไปหน้า Dashboard
            </button>
        </div>
    </div>

    <script src="assets/js/farm-setup.js"></script>
    <script src="assets/js/motion.js"></script>
</body>
</html>
